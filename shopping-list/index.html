<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de la Compra</title>
    <meta name="theme-color" content="#0891b2">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Compra">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="/images/favicon.png">
    <link rel="apple-touch-icon" href="/images/favicon.png">
    <link rel="stylesheet" href="styles.css?v=26">
</head>
<body>

    <!-- Auth screen -->
    <div class="pin-screen" id="authScreen">
        <div class="pin-box">
            <div class="pin-icon">&#128722;</div>
            <h2>Lista de la Compra</h2>
            <p>Inicia sesión para acceder</p>
            <button id="googleSignIn" class="btn-google">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" width="20">
                Entrar con Google
            </button>
            <button id="clearAuthCache" class="btn-clear-cache">¿Problemas para entrar? Pulsa aquí</button>
            <p class="pin-error" id="authError"></p>
        </div>
    </div>

    <!-- App (hidden until signed in) -->
    <div class="app" id="appContent" style="display:none;">
        <header class="app-header">
            <button class="btn-install" id="installBtn" style="display:none;" title="Instalar app">&#128242; Instalar</button>
            <h1>&#128722; Lista de la Compra</h1>
            <div class="header-actions">
                <button class="btn-theme" id="themeToggle" title="Cambiar tema">&#9728;&#65039;</button>
                <button class="btn-lock" id="signOutBtn" title="Cerrar sesión">&#128682;</button>
            </div>
        </header>

        <main>
            <form class="add-form" id="addForm">
                <div class="input-wrapper">
                    <input
                        type="text"
                        id="itemInput"
                        placeholder="Añadir producto..."
                        autocomplete="off"
                        required
                    />
                    <ul id="suggestions" class="suggestions-list"></ul>
                </div>
                <select id="categorySelect">
                    <option value="Fruta y Verdura">&#129382; Fruta y Verdura</option>
                    <option value="Lácteos y Huevos">&#129371; Lácteos y Huevos</option>
                    <option value="Carne y Pescado">&#129385; Carne y Pescado</option>
                    <option value="Pan y Cereales">&#129414; Pan y Cereales</option>
                    <option value="Limpieza e Higiene">&#129396; Limpieza e Higiene</option>
                    <option value="Despensa">&#129387; Despensa</option>
                    <option value="Congelados">&#10052; Congelados</option>
                    <option value="Otros">&#128722; Otros</option>
                </select>
                <button type="submit">Añadir</button>
                <span id="autoCatHint" class="auto-cat-hint"></span>
            </form>

            <div class="list-controls">
                <button id="filterPending" class="btn-filter" title="Mostrar solo pendientes">&#128065; Por comprar</button>
                <button id="scanTicket" class="btn-scan" title="Escanear ticket">&#128247; Escanear ticket</button>
                <button id="showFrequent" class="btn-frequent" title="Volver a pedir productos ya comprados">&#128257; Comprar de nuevo</button>
            </div>

            <div id="frequentPanel" class="frequent-panel" style="display:none;">
                <div class="frequent-chips" id="frequentChips"></div>
            </div>

            <div class="shopping-list" id="shoppingList">
                <p class="empty-state" id="emptyState">La lista está vacía. ¡Añade algo! &#129082;</p>
            </div>
        </main>
    </div>

    <!-- Scan modal -->
    <div class="scan-modal" id="scanModal" style="display:none;">
        <div class="scan-box">
            <div class="scan-header">
                <h3>&#128247; Escanear ticket</h3>
                <button id="scanClose" class="scan-close">&times;</button>
            </div>
            <div class="scan-body">
                <div class="scan-upload-options" id="scanUploadOptions">
                    <label class="scan-upload-label" id="scanCameraLabel">
                        &#128247; Hacer foto al ticket
                        <input type="file" id="scanCameraInput" accept="image/*" capture="environment" hidden>
                    </label>
                    <label class="scan-upload-label scan-upload-gallery" id="scanGalleryLabel">
                        &#128206; Elegir de galería
                        <input type="file" id="scanGalleryInput" accept="image/*" hidden>
                    </label>
                </div>
                <img id="scanPreview" class="scan-preview" style="display:none;" alt="Preview ticket">
                <button id="scanRetryPhoto" class="btn-scan-retry" style="display:none;">&#128247; Otra foto</button>
                <div id="scanProgress" class="scan-progress" style="display:none;">
                    <div class="scan-progress-bar" id="scanProgressBar"></div>
                    <span id="scanProgressText">Procesando...</span>
                </div>
                <div id="scanResults" class="scan-results" style="display:none;">
                    <p class="scan-results-title">Productos detectados:</p>
                    <ul id="scanResultsList" class="scan-results-list"></ul>
                    <div id="scanSummary" class="scan-summary" style="display:none;"></div>
                    <div class="scan-results-actions">
                        <button id="scanAddAll" class="btn-scan-add">&#10003; Añadir todos</button>
                        <button id="scanConfirmAdd" class="btn-scan-add" style="display:none;">&#10003; Confirmar</button>
                        <button id="scanCancel" class="btn-scan-cancel">Cancelar</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module" src="app.js?v=46"></script>
</body>
</html>
