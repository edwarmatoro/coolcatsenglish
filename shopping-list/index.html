<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping List</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- PIN screen -->
    <div class="pin-screen" id="pinScreen">
        <div class="pin-box">
            <div class="pin-icon">🔒</div>
            <h2>Shopping List</h2>
            <p>Enter PIN to access</p>
            <input
                type="password"
                id="pinInput"
                inputmode="numeric"
                maxlength="6"
                placeholder="· · · · · ·"
                autocomplete="off"
            />
            <button id="pinSubmit">Unlock</button>
            <p class="pin-error" id="pinError"></p>
        </div>
    </div>

    <!-- App (hidden until PIN is correct) -->
    <div class="app" id="appContent" style="display:none;">
        <header class="app-header">
            <h1>🛒 Shopping List</h1>
            <button class="btn-lock" id="lockBtn" title="Lock">🔒</button>
        </header>

        <main>
            <form class="add-form" id="addForm">
                <input
                    type="text"
                    id="itemInput"
                    placeholder="Add item..."
                    autocomplete="off"
                    required
                />
                <button type="submit">Add</button>
            </form>

            <div class="list-controls">
                <span id="itemCount" class="item-count"></span>
                <button id="clearChecked" class="btn-clear">Clear checked</button>
            </div>

            <ul class="shopping-list" id="shoppingList">
                <li class="empty-state" id="emptyState">Your list is empty. Add something! 🧺</li>
            </ul>
        </main>
    </div> <!-- /#appContent -->

    <!-- Firebase SDK -->
    <script type="module" src="app.js"></script>
</body>
</html>
