<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping List</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Auth screen -->
    <div class="pin-screen" id="authScreen">
        <div class="pin-box">
            <div class="pin-icon">�</div>
            <h2>Shopping List</h2>
            <p>Sign in to access your list</p>
            <button id="googleSignIn" class="btn-google">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" width="20">
                Sign in with Google
            </button>
            <p class="pin-error" id="authError"></p>
        </div>
    </div>

    <!-- App (hidden until signed in) -->
    <div class="app" id="appContent" style="display:none;">
        <header class="app-header">
            <h1>🛒 Shopping List</h1>
            <button class="btn-lock" id="signOutBtn" title="Sign out">�</button>
        </header>

        <main>
            <form class="add-form" id="addForm">
                <input
                    type="text"
                    id="itemInput"
                    placeholder="Add item..."
                    autocomplete="off"
                    required
                />
                <button type="submit">Add</button>
            </form>

            <div class="list-controls">
                <span id="itemCount" class="item-count"></span>
                <button id="clearChecked" class="btn-clear">Clear checked</button>
            </div>

            <ul class="shopping-list" id="shoppingList">
                <li class="empty-state" id="emptyState">Your list is empty. Add something! 🧺</li>
            </ul>
        </main>
    </div> <!-- /#appContent -->

    <!-- Firebase SDK -->
    <script type="module" src="app.js"></script>
</body>
</html>
